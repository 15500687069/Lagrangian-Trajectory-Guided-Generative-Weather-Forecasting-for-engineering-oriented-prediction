base_config: stage3_strict_pde_recover.yaml

experiment:
  name: ltg_stage3_strict_pde_finetune
  output_dir: outputs/stage3_strict_pde_finetune
  resume_checkpoint: outputs/stage3_strict_pde_recover/best.pt

loss:
  combine_mode: fixed_weighted
  lambda_field: 1.0
  lambda_traj: 0.3
  lambda_adv: 0.08
  lambda_phys: 0.20
  lambda_spec: 0.03
  field_extreme_weight: 0.12
  field_extreme_quantile: 0.99
  normalization:
    enabled: false
  curriculum:
    enabled: true
    adv_start_epoch: 2
    phys_start_epoch: 0
    spec_start_epoch: 3
    ramp_epochs: 6
  physics:
    divergence_weight: 0.35
    moist_static_energy_weight: 0.25
    strict_pde:
      enabled: true
      time_step_hours: 6.0
      continuity_weight: 1.0
      continuity_zero_reg: 0.15
      vorticity_weight: 1.0
      vorticity_viscosity: 0.0
      include_beta_term: true
      thermodynamic_weight: 0.8
      moisture_weight: 0.8
      geostrophic_weight: 0.6
      f_min: 1.0e-5

optimization:
  epochs: 18
  grad_clip_norm: 0.8
  fail_on_nan: true
  optimizer:
    lr: 4.0e-5
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    warmup_epochs: 2
    min_lr: 1.0e-6

evaluation:
  validate_every: 1
  save_every: 1
  checkpoint_metric: loss_total_raw
  checkpoint_mode: min
  test_every: 1
  test_max_batches: 0
  save_history: true
  history_file: metrics_history.jsonl
  test_metrics_file: test_metrics.jsonl
  early_stopping:
    enabled: true
    monitor: loss_total_raw
    mode: min
    patience: 4
    min_delta: 1.0e-4
    warmup_epochs: 3
