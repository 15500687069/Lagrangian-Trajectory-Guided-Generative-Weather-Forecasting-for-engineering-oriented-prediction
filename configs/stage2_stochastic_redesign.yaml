base_config: stage2_stochastic.yaml

experiment:
  name: ltg_stage2_stochastic_redesign
  output_dir: outputs/stage2_redesign

model:
  event_modulation:
    enabled: false

loss:
  combine_mode: normalized_weighted
  lambda_field: 1.0
  lambda_traj: 1.0
  lambda_adv: 0.6
  lambda_phys: 0.3
  lambda_spec: 0.2
  normalization:
    enabled: true
    ema_decay: 0.97
    eps: 1.0e-6
  curriculum:
    enabled: true
    adv_start_epoch: 2
    phys_start_epoch: 6
    spec_start_epoch: 3
    ramp_epochs: 6

optimization:
  epochs: 30
  optimizer:
    lr: 1.2e-4
