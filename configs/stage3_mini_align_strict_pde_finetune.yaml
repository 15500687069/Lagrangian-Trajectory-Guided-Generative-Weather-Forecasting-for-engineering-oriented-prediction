base_config: stage3_mini_align_strict_pde_recover.yaml

experiment:
  name: ltg_stage3_mini_align_strict_pde_finetune
  output_dir: outputs/stage3_mini_align_strict_pde_finetune
  resume_checkpoint: outputs/stage3_mini_align_strict_pde_recover/best.pt

loss:
  combine_mode: fixed_weighted
  lambda_field: 1.0
  lambda_traj: 0.58
  lambda_adv: 0.05
  lambda_phys: 0.22
  lambda_spec: 0.02
  curriculum:
    enabled: true
    adv_start_epoch: 2
    phys_start_epoch: 0
    spec_start_epoch: 3
    ramp_epochs: 6
  physics:
    divergence_weight: 0.35
    moist_static_energy_weight: 0.25
    strict_pde:
      enabled: true
      time_step_hours: 6.0
      continuity_weight: 1.0
      continuity_zero_reg: 0.15
      vorticity_weight: 1.0
      vorticity_viscosity: 0.0
      include_beta_term: true
      thermodynamic_weight: 0.8
      moisture_weight: 0.8
      geostrophic_weight: 0.6
      f_min: 1.0e-5

optimization:
  # Continue from recover; 20 -> 30 means +10 additional epochs.
  epochs: 30
  optimizer:
    lr: 6.0e-5

evaluation:
  checkpoint_metric: loss_total_raw
  checkpoint_mode: min
  dual_best:
    enabled: true
    field_monitor: loss_field
    field_mode: min
    field_filename: best_field.pt
    track_monitor: loss_traj
    track_mode: min
    track_filename: best_track.pt
  early_stopping:
    enabled: true
    monitor: loss_total_raw
    mode: min
    patience: 4
    min_delta: 1.0e-4
    warmup_epochs: 3
